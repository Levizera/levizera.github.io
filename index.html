<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Missão: Date com a Nora</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Quicksand:wght@500;700&display=swap" rel="stylesheet">
    <style>
        body {
            font-family: 'Quicksand', sans-serif;
            background-color: #fcf8f2; 
            overflow: hidden;
        }
        .text-brown { color: #5c3939; }
        .bg-pink-btn { background-color: #f2a6b6; }
        .bg-pink-btn:hover { background-color: #e590a1; }
        .bg-purple-btn { background-color: #d2c5ec; }
        
        #btn-nao {
            transition: top 0.15s ease-out, left 0.15s ease-out, background-color 0.3s;
            z-index: 50;
        }
        
        .fade-in { animation: fadeIn 0.5s ease-in-out forwards; }
        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px) scale(0.98); }
            to { opacity: 1; transform: translateY(0) scale(1); }
        }

        .glass-card {
            background: rgba(255, 255, 255, 0.85);
            backdrop-filter: blur(10px);
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.05);
        }

        .petal {
            position: absolute;
            background-color: #ffc0cb;
            border-radius: 50% 0 50% 50%;
            opacity: 0.4;
            animation: fall 10s linear infinite;
        }
        @keyframes fall {
            0% { transform: translateY(-10vh) rotate(0deg); }
            100% { transform: translateY(110vh) rotate(360deg); }
        }
    </style>
</head>
<body class="flex items-center justify-center h-screen w-screen relative">

    <!-- Pétalas -->
    <div class="petal" style="left: 10%; width: 15px; height: 15px; animation-delay: 0s;"></div>
    <div class="petal" style="left: 30%; width: 20px; height: 20px; animation-delay: 2s;"></div>
    <div class="petal" style="left: 70%; width: 12px; height: 12px; animation-delay: 4s;"></div>
    <div class="petal" style="left: 85%; width: 18px; height: 18px; animation-delay: 1s;"></div>

    <!-- ETAPA 1: O Convite -->
    <div id="step1" class="text-center p-8 max-w-lg mx-auto glass-card rounded-3xl fade-in w-11/12">
        <img src="cat.jpg" alt="Cat" class="w-32 h-32 object-cover rounded-3xl mx-auto mb-6 shadow-md">
        
        <h1 class="text-2xl md:text-3xl font-bold mb-8 text-brown">🌸 Você aceita sair comigo, Nora? 🌸</h1>
        
        <div class="flex justify-center gap-6 relative h-16 w-full items-center">
            <button id="btn-nao" class="bg-purple-btn text-brown font-bold py-3 px-8 rounded-full shadow-sm absolute right-4 md:relative md:right-auto text-sm cursor-not-allowed">
                não... 🙊
            </button>
            <button id="btn-sim" class="bg-pink-btn text-white font-bold py-3 px-10 rounded-full shadow-sm transform hover:scale-105 transition-transform" onclick="avancarEtapa(2)">
                SIM 💖
            </button>
        </div>
    </div>

    <!-- ETAPA 2: O Choque -->
    <div id="step2" class="hidden text-center p-8 max-w-lg mx-auto glass-card rounded-3xl fade-in w-11/12">
        <img src="cat2.jpg" alt="Cat Surpreso" class="w-32 h-32 object-cover rounded-3xl mx-auto mb-6 shadow-md">

        <h2 class="text-2xl md:text-3xl font-bold mb-2 text-brown uppercase">Pera, você disse sim?? 😭</h2>
        <p class="mb-8 text-brown opacity-70 text-sm">eu já tava super preparado pra você dizer não 🥲</p>
        
        <button class="bg-pink-btn text-white font-bold py-3 px-8 rounded-full shadow-sm transition-transform transform hover:scale-105" onclick="avancarEtapa(3)">
            ok, ok! 💅
        </button>
    </div>

    <!-- ETAPA 3: O Calendário -->
    <div id="step3" class="hidden text-center p-8 max-w-lg mx-auto glass-card rounded-3xl fade-in w-11/12">
        <div class="text-4xl mb-4">🗓️🐾</div>
        <h2 class="text-2xl font-bold mb-6 text-brown">Então... quando você tá livre?</h2>
        
        <div class="flex flex-col gap-5 text-left mb-6">
            <div class="relative">
                <label class="block text-xs font-bold text-brown mb-1 opacity-70">Escolha um dia ✨</label>
                <input type="date" id="data-encontro" class="w-full bg-white text-brown rounded-xl p-3 border border-gray-200 focus:outline-none focus:border-[#f2a6b6] shadow-sm">
            </div>
            <div class="relative">
                <label class="block text-xs font-bold text-brown mb-1 opacity-70">Que horas? ⏰</label>
                <input type="time" id="hora-encontro" class="w-full bg-white text-brown rounded-xl p-3 border border-gray-200 focus:outline-none focus:border-[#f2a6b6] shadow-sm">
            </div>
        </div>
        
        <button class="bg-pink-btn text-white font-bold py-3 px-6 rounded-full shadow-sm w-full transition-transform transform hover:scale-105" onclick="confirmarData()">
            marcar na agenda! 💌
        </button>
    </div>

    <!-- ETAPA 4: A Comida -->
    <div id="step4" class="hidden text-center p-8 max-w-lg mx-auto glass-card rounded-3xl fade-in w-11/12">
        <h2 class="text-2xl font-bold mb-6 text-brown">O que a gente vai amassar? 🍜✨</h2>
        
        <div class="grid grid-cols-2 gap-4 mb-6">
            <button class="bg-white border border-gray-100 p-4 rounded-2xl shadow-sm hover:bg-gray-50 flex flex-col items-center justify-center gap-2 transition-transform transform hover:scale-105" onclick="escolherComida('Pizza')">
                <span class="text-4xl">🍕</span>
                <span class="text-sm font-bold text-brown opacity-70">Pizza</span>
            </button>
            <button class="bg-white border border-gray-100 p-4 rounded-2xl shadow-sm hover:bg-gray-50 flex flex-col items-center justify-center gap-2 transition-transform transform hover:scale-105" onclick="escolherComida('Açaí')">
                <span class="text-4xl">🥣</span>
                <span class="text-sm font-bold text-brown opacity-70">Açaí</span>
            </button>
            <button class="bg-white border border-gray-100 p-4 rounded-2xl shadow-sm hover:bg-gray-50 flex flex-col items-center justify-center gap-2 transition-transform transform hover:scale-105" onclick="escolherComida('Hambúrguer')">
                <span class="text-4xl">🍔</span>
                <span class="text-sm font-bold text-brown opacity-70">Hambúrguer</span>
            </button>
            <button class="bg-purple-btn border border-transparent p-4 rounded-2xl shadow-sm hover:opacity-90 flex flex-col items-center justify-center gap-2 transition-transform transform hover:scale-105" onclick="escolherComida('Ficar em casa')">
                <span class="text-4xl">🎮😏</span>
                <span class="text-xs font-bold text-brown opacity-80 text-center">Ficar em casa jogando e pedir algo</span>
            </button>
        </div>
    </div>

    <!-- ETAPA 5: A Confirmação Final -->
    <div id="step5" class="hidden text-center p-8 max-w-lg mx-auto glass-card rounded-3xl fade-in w-11/12 relative">
        <img src="shrek.jpg" alt="Shrek" class="w-32 h-32 object-cover rounded-full mx-auto mb-6 shadow-md border-4 border-white">

        <!-- O texto dinâmico vai aparecer dentro desse H2 -->
        <h2 id="mensagem-final" class="text-2xl font-bold mb-4 text-brown"></h2>
        
        <p class="text-[10px] text-brown opacity-50 italic mt-6">
            texto de gente normal. fiz um site em html/tailwind pra você. nada demais. gg izi.
        </p>
        
        <div class="absolute bottom-2 left-0 w-full flex justify-center gap-4 text-pink-400 text-sm">
            💖 💖 💖 💖
        </div>
    </div>

    <script>
        const btnNao = document.getElementById('btn-nao');
        const isMobile = window.innerWidth < 768;

        btnNao.addEventListener('mouseover', function(e) {
            if (!isMobile) {
                this.style.position = 'fixed';
                const maxX = window.innerWidth - this.offsetWidth - 20;
                const maxY = window.innerHeight - this.offsetHeight - 20;
                const randomX = Math.max(10, Math.floor(Math.random() * maxX));
                const randomY = Math.max(10, Math.floor(Math.random() * maxY));
                
                this.style.left = randomX + 'px';
                this.style.top = randomY + 'px';
            }
        });

        if (isMobile) {
            btnNao.addEventListener('touchstart', function(e) {
                e.preventDefault(); 
                this.innerText = 'SIM 💖';
                this.classList.remove('bg-purple-btn', 'text-brown', 'text-sm');
                this.classList.add('bg-pink-btn', 'text-white', 'transform', 'scale-110');
                
                this.style.position = 'relative';
                this.style.left = 'auto';
                this.style.top = 'auto';
                
                setTimeout(() => { avancarEtapa(2); }, 1000);
            }, {passive: false});
        }

        function avancarEtapa(etapa) {
            document.querySelectorAll('div[id^="step"]').forEach(el => el.classList.add('hidden'));
            document.getElementById('step' + etapa).classList.remove('hidden');
        }

        function confirmarData() {
            const data = document.getElementById('data-encontro').value;
            const hora = document.getElementById('hora-encontro').value;
            
            if(!data || !hora) {
                alert("Preenche a data e hora aí, Nora! Não tenho bola de cristal. 🔮");
                return;
            }
            avancarEtapa(4);
        }

        function escolherComida(comida) {
            const dataInput = document.getElementById('data-encontro').value;
            const hora = document.getElementById('hora-encontro').value;
            
            const dataObj = new Date(dataInput + 'T00:00:00');
            const dataFormatada = dataObj.toLocaleDateString('pt-BR', { day: '2-digit', month: '2-digit' });
            
            const msgFinal = document.getElementById('mensagem-final');

            if (comida === 'Ficar em casa') {
                msgFinal.innerHTML = `tá bem, sua safadinha, dia ${dataFormatada} às ${hora} eu chego aí pra gente fazer umas "gameplays" 😏`;
            } else {
                msgFinal.innerHTML = `você não disse não. esteja pronta, dia ${dataFormatada} às ${hora}, eu vou te buscar 🚗`;
            }

            avancarEtapa(5);
        }
    </script>
</body>
</html>
